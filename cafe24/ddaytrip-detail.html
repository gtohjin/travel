<!--
  ============================================================
  디데이트립 (d-daytrip.co.kr) 상품 상세페이지 스타일 개선

  적용 방법:
  카페24 관리자 → 쇼핑몰 설정 → 고급설정 → 추가 스크립트
  → <head> 영역에 아래 코드 전체 붙여넣기

  * 실제 d-daytrip.co.kr DOM 구조 기반으로 작성됨
    - 상품명: .reservation_prod_name
    - 가격: .reservation_product_price
    - 이미지: #pcProdThumb img.BigImage + img.ThumbImage
    - 숨길 대상: .reservation_area
  ============================================================
-->

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<style>
/* ============================================================
   디데이트립 상세페이지 디자인 개선 CSS
   대상 URL: /reservation/detail
============================================================ */

body.ddaytrip-detail-page {
  background: #f0f2f5;
}

/* ===== 전체 래퍼 ===== */
.ddaytrip-detail-wrap {
  max-width: 720px;
  margin: 0 auto;
  background: #fff;
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
}

/* ===== 사진 갤러리 ===== */
.dd-gallery {
  position: relative;
  background: #000;
  width: 100%;
}
.dd-gallery .swiper { height: 300px; }
@media (min-width: 480px) { .dd-gallery .swiper { height: 380px; } }
.dd-gallery img { width: 100%; height: 100%; object-fit: cover; opacity: 0.92; }
.dd-gallery-counter {
  position: absolute; bottom: 12px; right: 16px;
  background: rgba(0,0,0,0.55); color: #fff;
  font-size: 0.78rem; padding: 4px 10px;
  border-radius: 50px; z-index: 10;
}
.dd-gallery-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(0,0,0,0.45); color: #fff;
  border: none; width: 36px; height: 36px; border-radius: 50%;
  font-size: 1rem; display: flex; align-items: center;
  justify-content: center; cursor: pointer; z-index: 10;
}
.dd-gallery-btn.prev { left: 12px; }
.dd-gallery-btn.next { right: 12px; }

/* ===== 상품 요약 ===== */
.dd-summary {
  background: #fff;
  padding: 20px 16px 16px;
  border-bottom: 1px solid #e5e7eb;
}
.dd-badge {
  display: inline-block;
  background: #e8f5e9; color: #1a7d3b;
  font-size: 0.78rem; font-weight: 700;
  padding: 4px 12px; border-radius: 50px; margin-bottom: 8px;
}
.dd-title {
  font-size: 1.3rem; font-weight: 900;
  color: #1a1a1a; margin-bottom: 6px; line-height: 1.3;
}
.dd-subtitle {
  font-size: 0.82rem; color: #6b7280; margin-bottom: 16px;
}
.dd-specs {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: #e5e7eb;
  border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden;
}
.dd-spec {
  background: #fff; padding: 12px;
  display: flex; flex-direction: column; gap: 4px;
}
.dd-spec dt { font-size: 0.72rem; color: #6b7280; font-weight: 600; }
.dd-spec dd { font-size: 0.9rem; font-weight: 700; color: #1a1a1a; }
.dd-spec-price { color: #ff6b00 !important; font-size: 1.1rem !important; }

/* ===== 패키지 예약 박스 ===== */
.dd-booking {
  background: #fff; padding: 20px 16px; margin-top: 8px;
}
.dd-booking h2 {
  font-size: 1.05rem; font-weight: 800; margin-bottom: 14px; color: #1a1a1a;
}
.dd-booking-form { display: flex; flex-direction: column; gap: 12px; margin-bottom: 18px; }
.dd-form-row { display: flex; align-items: center; gap: 10px; }
.dd-form-label { font-size: 0.85rem; font-weight: 600; min-width: 60px; flex-shrink: 0; }
.dd-form-input {
  flex: 1; border: 1.5px solid #e5e7eb; border-radius: 8px;
  padding: 10px 12px; font-size: 0.9rem; outline: none;
  font-family: inherit; color: #1a1a1a;
}
.dd-form-input:focus { border-color: #1a7d3b; }
.dd-people-select { display: flex; align-items: center; gap: 10px; flex: 1; }
.dd-people-btn {
  width: 34px; height: 34px; border: 1.5px solid #e5e7eb;
  border-radius: 50%; font-size: 1.2rem; display: flex;
  align-items: center; justify-content: center; cursor: pointer;
  font-family: inherit; transition: all 0.2s; background: #fff;
}
.dd-people-btn:hover { border-color: #1a7d3b; color: #1a7d3b; }
.dd-people-count { font-size: 1.1rem; font-weight: 700; min-width: 24px; text-align: center; }

.dd-price-box {
  background: #f7f8fa; border-radius: 12px; padding: 16px; margin-bottom: 16px;
}
.dd-price-row {
  display: flex; justify-content: space-between;
  font-size: 0.88rem; color: #6b7280; margin-bottom: 8px;
}
.dd-price-total {
  display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid #e5e7eb; padding-top: 12px; margin-top: 8px;
  font-weight: 700; font-size: 0.95rem;
}
.dd-total-num { font-size: 1.3rem; font-weight: 900; color: #ff6b00; }
.dd-price-note { font-size: 0.72rem; color: #9ca3af; margin-top: 6px; }

.dd-book-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.dd-btn-phone, .dd-btn-kakao, .dd-btn-reserve {
  padding: 13px; border-radius: 12px;
  font-size: 0.9rem; font-weight: 700; text-align: center;
  cursor: pointer; transition: opacity 0.2s; font-family: inherit;
  text-decoration: none; display: block; border: none;
}
.dd-btn-phone { background: #fff; border: 1.5px solid #1a7d3b; color: #1a7d3b; }
.dd-btn-kakao { background: #fee500; color: #3c1e1e; }
.dd-btn-reserve {
  grid-column: 1 / -1; background: #1a7d3b; color: #fff; font-size: 1rem;
}

/* ===== 탭 네비게이션 ===== */
.dd-tabs {
  display: flex; background: #fff;
  border-bottom: 2px solid #e5e7eb;
  position: sticky; top: 0; z-index: 100;
  overflow-x: auto; scrollbar-width: none;
  margin-top: 8px;
}
.dd-tabs::-webkit-scrollbar { display: none; }
.dd-tab {
  padding: 14px 18px; font-size: 0.88rem; font-weight: 600;
  color: #6b7280; white-space: nowrap;
  border-bottom: 3px solid transparent; cursor: pointer;
  transition: all 0.2s; font-family: inherit; background: none;
  border-left: none; border-right: none; border-top: none;
}
.dd-tab.active { color: #1a7d3b; border-bottom-color: #1a7d3b; }

/* ===== 섹션 공통 ===== */
.dd-section {
  background: #fff; padding: 24px 16px; margin-top: 8px;
}
.dd-section.bg-gray { background: #f7f8fa; }
.dd-section-title {
  font-size: 1.05rem; font-weight: 800; color: #1a1a1a; margin-bottom: 6px;
}
.dd-section-sub { font-size: 0.8rem; color: #6b7280; margin-bottom: 16px; }

/* ===== 원본 상세 내용 래퍼 ===== */
.dd-orig-detail {
  font-size: 0.88rem; line-height: 1.6; color: #374151;
}
.dd-orig-detail img { max-width: 100%; height: auto; border-radius: 8px; margin: 8px 0; }
.dd-orig-detail table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 0.82rem; }
.dd-orig-detail td, .dd-orig-detail th {
  border: 1px solid #e5e7eb; padding: 8px 10px; text-align: left;
}
.dd-orig-detail th { background: #1a7d3b; color: #fff; }

/* ===== 포함/불포함 ===== */
.dd-inc-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;
}
.dd-inc-card { border-radius: 12px; padding: 14px; }
.dd-inc-yes { background: #e8f5e9; border: 1px solid #a5d6a7; }
.dd-inc-no { background: #fff3e0; border: 1px solid #ffcc80; }
.dd-inc-title { font-size: 0.88rem; font-weight: 700; margin-bottom: 10px; }
.dd-inc-list { display: flex; flex-direction: column; gap: 6px; padding: 0; list-style: none; }
.dd-inc-list li {
  font-size: 0.8rem; color: #374151;
  padding-left: 10px; position: relative; line-height: 1.4;
}
.dd-inc-list li::before { content: '·'; position: absolute; left: 0; font-weight: 700; }

/* ===== 주의사항 박스 ===== */
.dd-notice-box {
  border: 1px solid #e5e7eb; border-radius: 12px;
  overflow: hidden; margin-top: 12px;
}
.dd-notice-header {
  background: #f7f8fa; padding: 12px 16px;
  font-size: 0.88rem; font-weight: 700;
  border-bottom: 1px solid #e5e7eb;
}
.dd-notice-body { padding: 12px 16px; list-style: none; }
.dd-notice-body li {
  font-size: 0.8rem; color: #374151;
  padding-left: 12px; position: relative;
  line-height: 1.5; margin-bottom: 4px;
}
.dd-notice-body li::before { content: '•'; position: absolute; left: 0; color: #ff6b00; }

/* ===== 아코디언 ===== */
.dd-accordion { border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
.dd-acc-item { border-bottom: 1px solid #e5e7eb; }
.dd-acc-item:last-child { border-bottom: none; }
.dd-acc-toggle {
  width: 100%; display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px; font-size: 0.88rem; font-weight: 600;
  background: #fff; cursor: pointer; font-family: inherit; border: none;
  text-align: left; transition: background 0.2s;
}
.dd-acc-toggle:hover { background: #f7f8fa; }
.dd-acc-arrow { font-size: 0.75rem; color: #9ca3af; transition: transform 0.3s; }
.dd-acc-item.open .dd-acc-arrow { transform: rotate(180deg); }
.dd-acc-content {
  display: none; padding: 12px 16px 16px;
  background: #f7f8fa; font-size: 0.82rem; color: #374151; line-height: 1.6;
}
.dd-acc-item.open .dd-acc-content { display: block; }

.dd-cancel-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.dd-cancel-table th {
  background: #1a7d3b; color: #fff;
  padding: 8px 12px; text-align: left; font-weight: 700;
}
.dd-cancel-table td {
  padding: 8px 12px; border-bottom: 1px solid #e5e7eb; background: #fff;
}
.dd-cancel-table tr:nth-child(even) td { background: #f7f8fa; }

/* ===== 골프장/숙박 카드 ===== */
.dd-info-card {
  border: 1px solid #e5e7eb; border-radius: 12px;
  overflow: hidden; margin-bottom: 12px;
}
.dd-info-card-img { height: 160px; overflow: hidden; }
.dd-info-card-img img { width: 100%; height: 100%; object-fit: cover; }
.dd-info-card-body { padding: 14px; }
.dd-info-card-name { font-size: 1rem; font-weight: 800; margin-bottom: 10px; }
.dd-info-specs { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; padding: 0; list-style: none; }
.dd-info-specs li { display: flex; justify-content: space-between; font-size: 0.8rem; }
.dd-info-specs li span:first-child { color: #6b7280; }
.dd-info-specs li span:last-child { font-weight: 600; }
.dd-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.dd-tag {
  background: #e8f5e9; color: #145e2c;
  font-size: 0.7rem; font-weight: 700;
  padding: 2px 8px; border-radius: 50px;
}

/* ===== 후기 ===== */
.dd-review-empty {
  text-align: center; color: #9ca3af;
  padding: 30px 20px; font-size: 0.85rem;
}
.dd-review-empty a { color: #1a7d3b; font-weight: 700; text-decoration: none; }

/* ===== 하단 고정 버튼 ===== */
.dd-sticky-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 720px;
  display: grid; grid-template-columns: 1fr 1fr 1.4fr;
  background: #fff; border-top: 1px solid #e5e7eb;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.1); z-index: 500;
}
.dd-sticky-btn {
  padding: 14px 8px; font-size: 0.85rem; font-weight: 700;
  text-align: center; border: none; cursor: pointer;
  font-family: inherit; text-decoration: none; display: block;
}
.dd-sticky-phone { background: #fff; color: #1a7d3b; border-right: 1px solid #e5e7eb; }
.dd-sticky-kakao { background: #fee500; color: #3c1e1e; border-right: 1px solid #e5e7eb; }
.dd-sticky-reserve { background: #1a7d3b; color: #fff; font-size: 0.95rem; }

/* ===== 모달 ===== */
.dd-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  z-index: 2000; display: none; align-items: flex-end;
}
.dd-modal-overlay.open { display: flex; }
.dd-modal {
  background: #fff; width: 100%; max-width: 720px;
  margin: 0 auto; border-radius: 20px 20px 0 0;
  max-height: 90vh; overflow-y: auto;
  animation: ddSlideUp 0.35s ease;
}
@keyframes ddSlideUp {
  from { transform: translateY(100%); } to { transform: translateY(0); }
}
.dd-modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 20px; border-bottom: 1px solid #e5e7eb;
  position: sticky; top: 0; background: #fff; z-index: 1;
}
.dd-modal-header h3 { font-size: 1rem; font-weight: 800; }
.dd-modal-close { font-size: 1.2rem; color: #9ca3af; cursor: pointer; background: none; border: none; font-family: inherit; }
.dd-modal-body { padding: 20px; }
.dd-form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.dd-form-group label { font-size: 0.85rem; font-weight: 600; }
.dd-form-group input,
.dd-form-group select,
.dd-form-group textarea {
  border: 1.5px solid #e5e7eb; border-radius: 8px;
  padding: 10px 12px; font-size: 0.9rem; font-family: inherit;
  outline: none; width: 100%; box-sizing: border-box;
}
.dd-form-group input:focus,
.dd-form-group select:focus,
.dd-form-group textarea:focus { border-color: #1a7d3b; }
.dd-agree { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: #6b7280; cursor: pointer; margin-bottom: 16px; }
.dd-btn-submit {
  background: #1a7d3b; color: #fff; padding: 14px; border-radius: 12px;
  font-size: 1rem; font-weight: 700; font-family: inherit;
  cursor: pointer; border: none; width: 100%;
}

/* 하단 바 높이만큼 여백 */
body.ddaytrip-detail-page { padding-bottom: 64px; }

/* 기존 카페24 예약 영역 숨김 */
body.ddaytrip-detail-page .reservation_area { display: none !important; }
</style>

<script>
(function() {
  'use strict';

  // 상세 페이지에서만 실행
  if (!location.pathname.includes('/reservation/detail')) return;

  // body에 클래스 추가 (CSS 적용용)
  document.body.classList.add('ddaytrip-detail-page');

  // 페이지 완전 로드 후 실행
  window.addEventListener('load', function() {
    buildDetailPage();
  });

  // ===== 유틸 함수 =====
  function extractPrice(str) {
    if (!str) return 0;
    return parseInt(str.replace(/[^0-9]/g, ''), 10) || 0;
  }

  function formatPrice(price, people) {
    if (!price) return '문의요망';
    return (price * people).toLocaleString('ko-KR') + '원~';
  }

  // ===== 포함/불포함 파싱 =====
  function parseInclusions() {
    var incYes = [], incNo = [], notices = [];
    var contEl = document.querySelector('#prdDetail .cont');
    if (!contEl) return { yes: incYes, no: incNo, notices: notices };

    var fullText = contEl.innerText || '';

    // ✓ 포함내역 섹션
    var yesMatch = fullText.match(/[✓☑]\s*포함내역([\s\S]*?)(?:[×✗☒]\s*불포함|$)/);
    if (yesMatch) {
      yesMatch[1].split('\n').forEach(function(line) {
        line = line.replace(/^[\s◆▶•\t]+/, '').trim();
        if (line && line.length > 2 && !line.includes('포함내역')) incYes.push(line);
      });
    }

    // × 불포함내역 섹션
    var noMatch = fullText.match(/[×✗☒]\s*불포함내역([\s\S]*?)(?:[✎✏]\s*중요|구마모토|일정|$)/);
    if (noMatch) {
      noMatch[1].split('\n').forEach(function(line) {
        line = line.replace(/^[\s◆▶•\t]+/, '').trim();
        if (line && line.length > 2 && !line.includes('불포함내역')) incNo.push(line);
      });
    }

    // ✎ 중요 안내사항 (노티스)
    var noteMatch = fullText.match(/[✎✏]\s*중요 안내사항([\s\S]*?)(?:여행일정|$)/);
    if (noteMatch) {
      noteMatch[1].split('\n').forEach(function(line) {
        line = line.replace(/^[\s\[※\t\]]+/, '').trim();
        if (line && line.length > 3) notices.push(line);
      });
    }

    return { yes: incYes, no: incNo, notices: notices };
  }

  // ===== 메인 빌드 함수 =====
  function buildDetailPage() {

    // 1. 상품 정보 추출
    var titleEl = document.querySelector('.reservation_prod_name');
    var priceEl = document.querySelector('.reservation_product_price');

    var productTitle = titleEl ? titleEl.innerText.trim() : document.title;
    var productPrice = priceEl ? priceEl.innerText.trim() : '';
    var basePrice = extractPrice(productPrice);

    // 2. 이미지 수집 (BigImage 먼저, ThumbImage는 small→big URL 변환)
    var thumbImgs = [];
    var bigImg = document.querySelector('#pcProdThumb img.BigImage');
    if (bigImg && bigImg.src) thumbImgs.push(bigImg.src);

    document.querySelectorAll('#pcProdThumb img.ThumbImage').forEach(function(img) {
      if (!img.src) return;
      var bigSrc = img.src
        .replace('/extra/small/', '/extra/big/')
        .replace('/product/small/', '/product/big/');
      if (thumbImgs.indexOf(bigSrc) === -1) thumbImgs.push(bigSrc);
    });

    // 이미지 없을 경우 기본값
    if (thumbImgs.length === 0) {
      thumbImgs = ['https://images.unsplash.com/photo-1535131749006-b7f58c99034b?w=800&auto=format&fit=crop'];
    }

    // 3. 포함/불포함 파싱
    var inclusions = parseInclusions();

    // 포함내역 기본값 (파싱 실패 시)
    if (inclusions.yes.length === 0) {
      inclusions.yes = ['상품 상세 내용을 확인해 주세요'];
    }
    if (inclusions.no.length === 0) {
      inclusions.no = ['상품 상세 내용을 확인해 주세요'];
    }

    // 4. 원본 상세 HTML (일정 탭에 표시)
    var detailCont = document.querySelector('#prdDetail .cont');
    var detailHTML = detailCont ? detailCont.innerHTML : '';

    // 5. 새 레이아웃 HTML 생성
    var gallerySlides = thumbImgs.map(function(src) {
      return '<div class="swiper-slide"><img src="' + src + '" alt="상품 이미지" loading="lazy"/></div>';
    }).join('');

    var incYesItems = inclusions.yes.map(function(t) { return '<li>' + t + '</li>'; }).join('');
    var incNoItems = inclusions.no.map(function(t) { return '<li>' + t + '</li>'; }).join('');
    var noticeItems = inclusions.notices.length
      ? inclusions.notices.map(function(t) { return '<li>' + t + '</li>'; }).join('')
      : '<li>상세 내용을 확인해 주세요</li>';

    var newHTML =
      '<div class="ddaytrip-detail-wrap">' +

        // 갤러리
        '<div class="dd-gallery">' +
          '<div class="swiper dd-gallery-swiper">' +
            '<div class="swiper-wrapper">' + gallerySlides + '</div>' +
          '</div>' +
          '<div class="dd-gallery-counter" id="ddGalCounter">1 / ' + thumbImgs.length + '</div>' +
          '<button class="dd-gallery-btn prev" id="ddGalPrev">&#8592;</button>' +
          '<button class="dd-gallery-btn next" id="ddGalNext">&#8594;</button>' +
        '</div>' +

        // 상품 요약
        '<div class="dd-summary">' +
          '<span class="dd-badge">✈️ 골프 패키지</span>' +
          '<h1 class="dd-title">' + productTitle + '</h1>' +
          '<p class="dd-subtitle">해외골프여행 맞춤전문 디데이트립</p>' +
          '<dl class="dd-specs">' +
            '<div class="dd-spec"><dt>💰 최저가 (1인)</dt><dd class="dd-spec-price" id="ddSpecPrice">' + (productPrice || '문의요망') + '</dd></div>' +
            '<div class="dd-spec"><dt>👥 최소인원</dt><dd>2인</dd></div>' +
            '<div class="dd-spec"><dt>✈️ 교통편</dt><dd>항공 포함</dd></div>' +
            '<div class="dd-spec"><dt>📍 출발지</dt><dd>인천 / 김해</dd></div>' +
          '</dl>' +
        '</div>' +

        // 패키지 예약

  // ===== 이벤트 바인딩 =====
  function bindEvents(basePrice) {

    // 갤러리 Swiper
    var galSwiper = new Swiper('.dd-gallery-swiper', {
      loop: false,
      speed: 400,
      on: {
        slideChange: function() {
          var c = document.getElementById('ddGalCounter');
          if (c) c.textContent = (this.realIndex + 1) + ' / ' + this.slides.length;
        }
      }
    });
    var galPrev = document.getElementById('ddGalPrev');
    var galNext = document.getElementById('ddGalNext');
    if (galPrev) galPrev.addEventListener('click', function() { galSwiper.slidePrev(); });
    if (galNext) galNext.addEventListener('click', function() { galSwiper.slideNext(); });

    // 인원 카운터
    var people = 2;

    function updatePriceUI() {
      var countEl = document.getElementById('ddPeopleCount');
      var labelEl = document.getElementById('ddPeopleLabel');
      var totalEl = document.getElementById('ddTotalPrice');
      if (countEl) countEl.textContent = people;
      if (labelEl) labelEl.textContent = people + '명';
      if (totalEl) totalEl.textContent = formatPrice(basePrice, people);
    }

    var minusBtn = document.getElementById('ddMinus');
    var plusBtn = document.getElementById('ddPlus');
    if (minusBtn) minusBtn.addEventListener('click', function() {
      if (people > 1) { people--; updatePriceUI(); }
    });
    if (plusBtn) plusBtn.addEventListener('click', function() {
      if (people < 30) { people++; updatePriceUI(); }
    });

    // 출발일 기본값 (오늘 +14일)
    var d = new Date();
    d.setDate(d.getDate() + 14);
    var dateInput = document.getElementById('ddDepartDate');
    if (dateInput) {
      dateInput.min = new Date().toISOString().split('T')[0];
      dateInput.value = d.toISOString().split('T')[0];
    }

    // 탭 클릭 → 스크롤
    document.querySelectorAll('.dd-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.dd-tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        var sec = document.getElementById(tab.dataset.target);
        if (sec) {
          var top = sec.getBoundingClientRect().top + window.scrollY - 56;
          window.scrollTo({ top: top, behavior: 'smooth' });
        }
      });
    });

    // 스크롤 시 탭 자동 활성화
    var tabSections = ['ddItinerary', 'ddIncludes', 'ddCourseInfo', 'ddTips', 'ddReviews'];
    var tabObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var id = entry.target.id;
          document.querySelectorAll('.dd-tab').forEach(function(tab) {
            tab.classList.toggle('active', tab.dataset.target === id);
          });
        }
      });
    }, { threshold: 0.2, rootMargin: '-60px 0px -55% 0px' });

    tabSections.forEach(function(id) {
      var el = document.getElementById(id);
      if (el) tabObserver.observe(el);
    });

    // 아코디언
    document.querySelectorAll('.dd-acc-toggle').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var item = btn.closest('.dd-acc-item');
        var isOpen = item.classList.contains('open');
        document.querySelectorAll('.dd-acc-item').forEach(function(i) { i.classList.remove('open'); });
        if (!isOpen) item.classList.add('open');
      });
    });

    // 모달
    var overlay = document.getElementById('ddModalOverlay');
    function openModal() {
      if (overlay) overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      if (overlay) overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    var openBtn = document.getElementById('ddOpenModal');
    var stickyBtn = document.getElementById('ddStickyReserve');
    var closeBtn = document.getElementById('ddModalClose');
    var form = document.getElementById('ddReserveForm');

    if (openBtn) openBtn.addEventListener('click', openModal);
    if (stickyBtn) stickyBtn.addEventListener('click', openModal);
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (overlay) overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeModal();
    });
    if (form) form.addEventListener('submit', function(e) {
      e.preventDefault();
      alert('예약 신청이 완료되었습니다!\n담당자가 확인 후 빠르게 연락드리겠습니다.\n감사합니다 😊');
      closeModal();
    });
  }
